<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>2026 꿈키움 학교 밖 교육 강좌 안내</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#152460;--blue:#2952d9;--sky:#e9effe;--gold:#e8970f;
  --mint:#0f9e7b;--mint-bg:#d6f5ee;
  --white:#fff;--g50:#f7f8fc;--g100:#eef0f8;--g200:#dde1f0;
  --g400:#8892b0;--g700:#3c4a6b;--text:#111827;
  --r:14px;--sh:0 2px 16px rgba(21,36,96,.08);--sh2:0 8px 36px rgba(21,36,96,.18);
}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:var(--g50);color:var(--text);line-height:1.6}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,#0d1940 0%,var(--navy) 45%,#1e3d9e 100%);
  padding:56px 24px 40px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 60%,rgba(41,82,217,.25) 0%,transparent 55%),
             radial-gradient(ellipse at 80% 20%,rgba(232,151,15,.12) 0%,transparent 50%)}
.hero-in{position:relative;z-index:1;max-width:820px;margin:0 auto}
.hero-badge{display:inline-block;background:var(--gold);color:var(--navy);
  font-size:11px;font-weight:800;padding:4px 14px;border-radius:20px;
  letter-spacing:.8px;margin-bottom:16px}
.hero h1{font-family:'Noto Serif KR',serif;font-size:clamp(20px,4vw,32px);
  font-weight:700;color:#fff;margin-bottom:10px;line-height:1.4}
.hero p{color:rgba(255,255,255,.7);font-size:13px;line-height:1.9;margin-bottom:24px}
.stats{display:flex;gap:28px;justify-content:center;flex-wrap:wrap}
.stat-num{font-size:26px;font-weight:900;color:var(--gold);display:block}
.stat-label{font-size:11px;color:rgba(255,255,255,.6)}

/* ── TOOLBAR ── */
.toolbar{background:#fff;border-bottom:1px solid var(--g200);
  padding:12px 20px;position:sticky;top:0;z-index:200;
  box-shadow:0 2px 10px rgba(0,0,0,.06)}
.tb-inner{max-width:1200px;margin:0 auto;display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.search-wrap{flex:1;min-width:160px;position:relative}
.search-wrap input{width:100%;padding:8px 13px 8px 38px;border:1.5px solid var(--g200);
  border-radius:10px;font:13px 'Noto Sans KR',sans-serif;outline:none;
  transition:border-color .2s,box-shadow .2s}
.search-wrap input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(41,82,217,.1)}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--g400)}
.fsel{padding:7px 11px;border:1.5px solid var(--g200);border-radius:10px;
  font:13px 'Noto Sans KR',sans-serif;outline:none;cursor:pointer;background:#fff;
  transition:border-color .2s;min-width:110px}
.fsel:focus{border-color:var(--blue)}
.rc{font-size:12px;color:var(--g400);white-space:nowrap;margin-left:auto}

/* ── 필터 바 (지역 + 분야) ── */
.filter-bar{background:#fff;border-bottom:1px solid var(--g200);padding:11px 20px}
.filter-bar-inner{max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:9px}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-label{font-size:11px;font-weight:700;color:var(--g400);
  letter-spacing:.4px;white-space:nowrap;min-width:52px}

/* 지역 태그 — 더 크고 뚜렷하게 */
.rtag{padding:6px 15px;border-radius:20px;border:2px solid var(--g200);
  font:600 12px 'Noto Sans KR',sans-serif;cursor:pointer;background:#fff;
  color:var(--g700);transition:all .18s;white-space:nowrap}
.rtag:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.12)}
.rtag.on{color:#fff;border-color:transparent;
  box-shadow:0 3px 10px rgba(0,0,0,.2);transform:translateY(-1px)}

/* 분야 태그 */
.ftag{padding:5px 12px;border-radius:20px;border:1.5px solid var(--g200);
  font:500 11px 'Noto Sans KR',sans-serif;cursor:pointer;background:#fff;
  color:var(--g700);transition:all .18s;white-space:nowrap}
.ftag:hover{border-color:var(--blue);color:var(--blue)}
.ftag.on{color:#fff;border-color:transparent;font-weight:700}

.tag-clear{padding:5px 12px;border-radius:20px;border:1.5px solid var(--g200);
  font:500 11px 'Noto Sans KR',sans-serif;cursor:pointer;background:#fff;
  color:var(--g400);transition:all .18s}
.tag-clear:hover{background:var(--g100)}
.tags-wrap{display:flex;flex-wrap:wrap;gap:6px}

/* ── MAIN ── */
.main{max-width:1200px;margin:0 auto;padding:22px 18px}
.itabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.itab{padding:5px 13px;border-radius:20px;border:1.5px solid var(--g200);
  font:500 11px 'Noto Sans KR',sans-serif;cursor:pointer;background:#fff;
  color:var(--g700);transition:all .18s;white-space:nowrap}
.itab:hover{border-color:var(--blue);color:var(--blue)}
.itab.on{background:var(--navy);border-color:var(--navy);color:#fff;font-weight:700}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}

/* ── CARD ── */
.card{background:#fff;border-radius:var(--r);border:1px solid var(--g200);
  box-shadow:var(--sh);overflow:hidden;cursor:pointer;
  transition:transform .2s,box-shadow .2s,border-color .2s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);box-shadow:var(--sh2);border-color:var(--blue)}
.ch{padding:16px 17px 12px;position:relative;overflow:hidden}
.ch::after{content:'';position:absolute;right:-24px;top:-24px;width:100px;height:100px;
  border-radius:50%;background:rgba(255,255,255,.06);pointer-events:none}

/* 카드 헤더 상단 줄: 지역 배지 + 강좌코드 */
.ch-top{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.cregion{display:inline-flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.95);
  border-radius:12px;padding:3px 10px;
  font-size:11px;font-weight:800;letter-spacing:.3px}
.cregion-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ccode{display:inline-block;background:rgba(255,255,255,.2);color:rgba(255,255,255,.9);
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;
  letter-spacing:.4px;font-family:monospace}
.cinst{font-size:11px;color:rgba(255,255,255,.6);margin-bottom:3px}
.cname{font-size:13px;font-weight:700;color:#fff;line-height:1.4;margin-bottom:7px}
.cftags{display:flex;flex-wrap:wrap;gap:4px}
.cftag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;
  background:rgba(255,255,255,.18);color:rgba(255,255,255,.95)}

.cb{padding:13px 16px;flex:1;display:flex;flex-direction:column;gap:8px}
.cintro{font-size:12px;color:var(--g700);line-height:1.6;flex:1;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cmeta{display:flex;flex-wrap:wrap;gap:4px}
.chip{display:inline-flex;align-items:center;gap:3px;background:var(--sky);color:var(--navy);
  font-size:11px;font-weight:500;padding:3px 8px;border-radius:12px}
.chip.m{background:var(--mint-bg);color:#065f46}
.chip.g{background:#fef3c7;color:#92400e}
.cf{padding:9px 16px;border-top:1px solid var(--g100);
  display:flex;justify-content:space-between;align-items:center}
.cdate{font-size:11px;color:var(--g400);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;max-width:200px}
.carr{color:var(--blue);font-weight:700}

.empty{text-align:center;padding:80px 20px;color:var(--g400)}
.empty-ico{font-size:44px;margin-bottom:14px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(8,14,36,.65);z-index:500;
  display:flex;align-items:flex-start;justify-content:center;padding:20px 14px;
  overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:20px;width:100%;max-width:700px;overflow:hidden;
  transform:translateY(24px);transition:transform .22s;
  box-shadow:0 24px 80px rgba(0,0,0,.28);margin:auto}
.overlay.open .modal{transform:translateY(0)}
.mh{padding:26px 30px 20px;color:#fff;position:relative}
.mh::after{content:'';position:absolute;right:-40px;top:-40px;width:160px;height:160px;
  border-radius:50%;background:rgba(255,255,255,.05);pointer-events:none}
.mcl{position:absolute;top:13px;right:13px;width:30px;height:30px;
  background:rgba(255,255,255,.14);border:none;border-radius:50%;color:#fff;
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s;z-index:1}
.mcl:hover{background:rgba(255,255,255,.28)}
.mh-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.mregion{display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.92);border-radius:14px;padding:4px 12px;
  font-size:12px;font-weight:800;letter-spacing:.3px}
.mregion-dot{width:8px;height:8px;border-radius:50%}
.mcode{background:rgba(255,255,255,.2);color:rgba(255,255,255,.9);
  font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;
  letter-spacing:.5px;font-family:monospace}
.minst{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:3px}
.mtitle{font-family:'Noto Serif KR',serif;font-size:19px;font-weight:700;
  line-height:1.35;margin-bottom:9px}
.mftags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.mftag{font-size:11px;padding:3px 10px;border-radius:10px;
  background:rgba(255,255,255,.18);color:rgba(255,255,255,.95);font-weight:600}
.mchips{display:flex;flex-wrap:wrap;gap:5px}
.mchip{font-size:11px;padding:3px 10px;border-radius:10px;
  background:rgba(255,255,255,.12);color:rgba(255,255,255,.85)}
.mb{padding:22px 30px}
.sec{margin-bottom:20px}
.stitle{font-size:11px;font-weight:700;color:var(--navy);padding:4px 10px;
  background:var(--sky);border-left:4px solid var(--navy);
  border-radius:0 7px 7px 0;margin-bottom:9px;letter-spacing:.3px}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.iitem{background:var(--g50);border-radius:8px;padding:8px 12px}
.ilabel{font-size:10px;font-weight:700;color:var(--g400);margin-bottom:2px;letter-spacing:.3px}
.ival{font-size:12px;color:var(--text);white-space:pre-line}
.ibox{background:var(--sky);border-radius:10px;padding:12px 15px;
  font-size:13px;color:var(--navy);line-height:1.7;font-weight:500}
.goals{display:flex;flex-direction:column;gap:5px}
.goal{background:var(--g50);border-radius:8px;padding:8px 12px;
  font-size:12px;color:var(--text);line-height:1.65;border-left:3px solid var(--blue)}
.icard{background:var(--g50);border-radius:10px;padding:11px 15px;margin-bottom:6px}
.iname{font-size:13px;font-weight:700;margin-bottom:2px}
.imeta{font-size:11px;color:var(--g400)}
.ibio{font-size:12px;color:var(--g700);margin-top:6px;line-height:1.7;white-space:pre-line}
.sched-table{width:100%;border-collapse:collapse;font-size:12px}
.sched-table th{background:var(--navy);color:#fff;padding:7px 10px;font-size:11px;font-weight:600;text-align:center}
.sched-table td{padding:8px 10px;border-bottom:1px solid var(--g100);vertical-align:middle}
.sched-table tr:last-child td{border-bottom:none}
.sched-table tr:nth-child(even) td{background:var(--g50)}
.day-badge{display:inline-block;width:22px;height:22px;border-radius:50%;
  background:var(--navy);color:#fff;font-size:10px;font-weight:700;
  line-height:22px;text-align:center}
.day-badge.sat{background:#1a5276}.day-badge.sun{background:#922b21}
.time-range{font-weight:600;color:var(--navy)}
.sess-cnt{background:var(--sky);color:var(--navy);font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:10px}
.total-row td{background:#f0f4ff!important;font-weight:700;color:var(--navy);
  font-size:12px;border-top:2px solid var(--navy)}
.stable{width:100%;border-collapse:collapse;font-size:12px}
.stable th{background:var(--navy);color:#fff;padding:6px 8px;text-align:left;font-weight:600;font-size:11px}
.stable td{padding:6px 8px;border-bottom:1px solid var(--g100)}
.stable tr:nth-child(even) td{background:var(--g50)}
.snum{width:22px;height:22px;background:var(--sky);color:var(--navy);
  border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  font-weight:700;font-size:10px}
.apply{background:linear-gradient(130deg,var(--gold) 0%,#f59e0b 100%);
  border-radius:12px;padding:16px 20px;color:#fff}
.apply h4{font-size:13px;font-weight:700;margin-bottom:6px}
.apply p{font-size:12px;opacity:.92;line-height:1.85}
.mfooter{text-align:center;padding:14px;background:var(--g50);
  border-top:1px solid var(--g200);font-size:12px;color:var(--g700);font-weight:500}
@media(max-width:580px){
  .mh,.mb{padding:20px 16px} .igrid{grid-template-columns:1fr}
  .hero{padding:36px 16px 28px} .sched-table td,.sched-table th{padding:6px 7px}
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-in">
    <div class="hero-badge">충청남도교육청</div>
    <h1>2026학년도 1학기<br>꿈키움 학교 밖 교육<br>창의적체험활동 강좌 안내</h1>
    <p>충남 관내 고등학생을 위한 대학 연계 창의적 체험활동 프로그램입니다.<br>관심 강좌를 클릭하면 상세 정보를 확인할 수 있습니다.</p>
    <div class="stats">
      <div><span class="stat-num">72</span><span class="stat-label">개 강좌</span></div>
      <div><span class="stat-num">15</span><span class="stat-label">개 대학</span></div>
      <div><span class="stat-num">17</span><span class="stat-label">차시 운영</span></div>
    </div>
  </div>
</div>

<!-- 검색 바 -->
<div class="toolbar">
  <div class="tb-inner">
    <div class="search-wrap">
      <span class="si">🔍</span>
      <input type="text" id="search" placeholder="강좌명, 기관명, 강좌코드 검색…" oninput="render()"/>
    </div>
    <select class="fsel" id="f-inst" onchange="setInst(this.value)">
      <option value="">전체 기관</option><option value="건양대학교">건양대학교</option><option value="나사렛대학교">나사렛대학교</option><option value="남서울대학교">남서울대학교</option><option value="백석대학교">백석대학교</option><option value="백석문화대학교">백석문화대학교</option><option value="상명대학교">상명대학교</option><option value="선문대학교">선문대학교</option><option value="순천향대학교">순천향대학교</option><option value="신성대학교">신성대학교</option><option value="중부대학교">중부대학교</option><option value="한국폴리텍IV대학 아산캠퍼스">한국폴리텍IV대학 아산캠퍼스</option><option value="한국폴리텍대학 충남캠퍼스">한국폴리텍대학 충남캠퍼스</option><option value="한서대학교">한서대학교</option><option value="혜전대학교">혜전대학교</option><option value="호서대학교">호서대학교</option>
    </select>
    <select class="fsel" id="f-method" onchange="render()">
      <option value="">전체 방식</option><option value="강의형">강의형</option><option value="실험·실습형">실험·실습형</option><option value="토의·토론학습형">토의·토론학습형</option><option value="프로젝트형">프로젝트형</option><option value="혼합형">혼합형</option>
    </select>
    <span class="rc" id="rc"></span>
  </div>
</div>

<!-- 지역 + 분야 필터 -->
<div class="filter-bar">
  <div class="filter-bar-inner">
    <div class="filter-row">
      <span class="filter-label">📍 지역</span>
      <div class="tags-wrap">
        <button class="tag-clear" id="rclear" onclick="clearRegions()">전체</button>
        <button class="rtag" data-region="천안" onclick="toggleRegion('천안')">천안</button><button class="rtag" data-region="아산" onclick="toggleRegion('아산')">아산</button><button class="rtag" data-region="홍성" onclick="toggleRegion('홍성')">홍성</button><button class="rtag" data-region="서산" onclick="toggleRegion('서산')">서산</button><button class="rtag" data-region="당진" onclick="toggleRegion('당진')">당진</button><button class="rtag" data-region="논산계룡" onclick="toggleRegion('논산계룡')">논산계룡</button><button class="rtag" data-region="금산" onclick="toggleRegion('금산')">금산</button>
      </div>
    </div>
    <div class="filter-row">
      <span class="filter-label">🎓 계열</span>
      <div class="tags-wrap">
        <button class="tag-clear" onclick="clearFields()">전체</button>
        <button class="ftag" data-field="공학·IT" onclick="toggleField('공학·IT')">공학·IT</button><button class="ftag" data-field="의약·보건" onclick="toggleField('의약·보건')">의약·보건</button><button class="ftag" data-field="예술·디자인" onclick="toggleField('예술·디자인')">예술·디자인</button><button class="ftag" data-field="생명·자연과학" onclick="toggleField('생명·자연과학')">생명·자연과학</button><button class="ftag" data-field="경영·경제" onclick="toggleField('경영·경제')">경영·경제</button><button class="ftag" data-field="인문·어문" onclick="toggleField('인문·어문')">인문·어문</button><button class="ftag" data-field="법·경찰·군사" onclick="toggleField('법·경찰·군사')">법·경찰·군사</button><button class="ftag" data-field="관광·서비스" onclick="toggleField('관광·서비스')">관광·서비스</button><button class="ftag" data-field="식품·조리" onclick="toggleField('식품·조리')">식품·조리</button><button class="ftag" data-field="항공·우주" onclick="toggleField('항공·우주')">항공·우주</button><button class="ftag" data-field="사회·복지" onclick="toggleField('사회·복지')">사회·복지</button><button class="ftag" data-field="스포츠·체육" onclick="toggleField('스포츠·체육')">스포츠·체육</button><button class="ftag" data-field="미디어·영상" onclick="toggleField('미디어·영상')">미디어·영상</button><button class="ftag" data-field="건축·도시" onclick="toggleField('건축·도시')">건축·도시</button><button class="ftag" data-field="반려동물·농업" onclick="toggleField('반려동물·농업')">반려동물·농업</button>
      </div>
    </div>
  </div>
</div>

let activeInst    = '';

/* ── 지역 필터 ── */
function toggleRegion(r) {
  activeRegions.has(r) ? activeRegions.delete(r) : activeRegions.add(r);
  document.querySelectorAll('.rtag').forEach(btn => {
    const on = activeRegions.has(btn.dataset.region);
    btn.classList.toggle('on', on);
    btn.style.background = on ? regionCol(btn.dataset.region) : '';
    btn.style.color = on ? '#fff' : '';
  });
  render();
}
function clearRegions() {
  activeRegions.clear();
  document.querySelectorAll('.rtag').forEach(b => {
    b.classList.remove('on'); b.style.background=''; b.style.color='';
  });
  render();
}

/* ── 분야 필터 ── */
function toggleField(f) {
  activeFields.has(f) ? activeFields.delete(f) : activeFields.add(f);
  document.querySelectorAll('.ftag').forEach(btn => {
    const on = activeFields.has(btn.dataset.field);
    btn.classList.toggle('on', on);
    btn.style.background = on ? fieldCol(btn.dataset.field) : '';
  });
  render();
}
function clearFields() {
  activeFields.clear();
  document.querySelectorAll('.ftag').forEach(b => { b.classList.remove('on'); b.style.background=''; });
  render();
}

/* ── 기관 탭 ── */
function buildTabs() {
  const insts = ['전체', ...new Set(DATA.map(c=>c.기관명).sort())];
  document.getElementById('itabs').innerHTML = insts.map(inst => {
    const key = inst==='전체'?'':inst, on = key===activeInst;
    const cnt = key ? DATA.filter(c=>c.기관명===inst).length : DATA.length;
    return `<button class="itab${on?' on':''}" onclick="setInst('${key}')">${inst} (${cnt})</button>`;
  }).join('');
}
function setInst(v) {
  activeInst=v; document.getElementById('f-inst').value=v; buildTabs(); render();
}

/* ── 일정 HTML ── */
function buildScheduleHTML(schedule) {
  if (!schedule || !schedule.length) return '';
  const WD = {'월':'','화':'','수':'','목':'','금':'','토':'sat','일':'sun'};
  const rows = schedule.map(d => `<tr>
    <td style="text-align:center"><div class="day-badge ${WD[d.요일]||''}">${d.요일}</div></td>
    <td><strong>${d.date.slice(5).replace('-','/')}</strong></td>
    <td class="time-range">${d.시작} ~ ${d.종료}</td>
    <td style="text-align:center"><span class="sess-cnt">${d.차시수}차시</span></td>
  </tr>`).join('');
  const total = schedule.reduce((s,d)=>s+d.차시수,0);
  return `<div style="overflow-x:auto"><table class="sched-table">
    <thead><tr>
      <th style="width:36px">요일</th><th style="width:68px">날짜</th>
      <th>수업 시간</th><th style="width:54px">차시</th>
    </tr></thead>
    <tbody>${rows}
      <tr class="total-row">
        <td colspan="3" style="text-align:right;padding-right:16px">총 수업일수</td>
        <td style="text-align:center">${schedule.length}일 / ${total}차시</td>
      </tr>
    </tbody>
  </table></div>`;
}

/* ── 렌더 ── */
function render() {
  const q      = document.getElementById('search').value.toLowerCase();
  const inst   = document.getElementById('f-inst').value;
  const method = document.getElementById('f-method').value;
  activeInst = inst; buildTabs();

  const list = DATA.filter(c => {
    if (inst   && c.기관명 !== inst) return false;
    if (method && c.수업방식 !== method) return false;
    if (activeRegions.size > 0 && !activeRegions.has(c.지역)) return false;
    if (activeFields.size  > 0 && ![...activeFields].some(f=>(c.분야||[]).includes(f))) return false;
    if (q) {
      const t = [c.강좌명,c.강좌코드,c.기관명,c.지역,c.한줄소개,c.추천대상,
                 ...(c.분야||[]),...(c.강사||[]).map(i=>i.성명)].join(' ').toLowerCase();
      if (!t.includes(q)) return false;
    }
    return true;
  });

  document.getElementById('rc').textContent = list.length+'개 강좌';
  const grid=document.getElementById('grid'), empty=document.getElementById('empty');
  if (!list.length) { grid.innerHTML=''; empty.style.display=''; return; }
  empty.style.display='none';

  grid.innerHTML = list.map(c => {
    const idx=DATA.indexOf(c), bg=cardCol(c.기관명), rc=regionCol(c.지역);
    const ftags=(c.분야||[]).map(f=>`<span class="cftag">${f}</span>`).join('');
    return `<div class="card" onclick="openModal(${idx})">
      <div class="ch" style="background:linear-gradient(130deg,${bg} 0%,${bg}cc 100%)">
        <div class="ch-top">
          <span class="cregion" style="color:${rc}">
            <span class="cregion-dot" style="background:${rc}"></span>${c.지역}
          </span>
          <span class="ccode">${c.강좌코드}</span>
        </div>
        <div class="cinst">${c.기관명}</div>
        <div class="cname">${c.강좌명}</div>
        <div class="cftags">${ftags}</div>
      </div>
      <div class="cb">
        <div class="cintro">${c.한줄소개||c.추천대상||'강좌 상세 정보를 확인하세요.'}</div>
        <div class="cmeta">
          ${c.수업방식?`<span class="chip m">${c.수업방식}</span>`:''}
          ${c.일정&&c.일정.length?`<span class="chip g">📅 ${c.일정.length}일 수업</span>`:''}
          ${c.운영시작일?`<span class="chip">${c.운영시작일.slice(5)}~</span>`:''}
        </div>

        <span class="carr">→</span>
      </div>
    </div>`;
  }).join('');
}

        <div class="stitle">📋 강좌 기본 정보</div>
        <div class="igrid">
          ${c.수업장소?`<div class="iitem"><div class="ilabel">수업 장소</div><div class="ival">${c.수업장소}</div></div>`:''}
          ${c.운영시작일?`<div class="iitem"><div class="ilabel">운영 기간</div><div class="ival">${c.운영시작일} ~ ${c.운영종료일}</div></div>`:''}
          ${c.수업요일시간?`<div class="iitem"><div class="ilabel">수업 요일/시간</div><div class="ival">${c.수업요일시간}</div></div>`:''}
          ${c.수업방식?`<div class="iitem"><div class="ilabel">수업 방식</div><div class="ival">${c.수업방식}</div></div>`:''}
          ${c.운영대상?`<div class="iitem"><div class="ilabel">운영 대상</div><div class="ival">${c.운영대상}</div></div>`:''}
          ${c.준비물등&&!['x',' x'].includes(c.준비물등.toLowerCase().trim())?`<div class="iitem"><div class="ilabel">준비물/복장</div><div class="ival">${c.준비물등}</div></div>`:''}
        </div>
      </div>
      ${c.일정&&c.일정.length?`
      <div class="sec">
        <div class="stitle">📆 수업 일정 (언제 가야 하나요?)</div>
        ${buildScheduleHTML(c.일정)}
      </div>`:''}
      ${(c.학습목표1||c.학습목표2)?`
      <div class="sec">
        <div class="stitle">🎯 학습 목표</div>
        <div class="goals">
          ${c.학습목표1?`<div class="goal">${c.학습목표1}</div>`:''}
          ${c.학습목표2?`<div class="goal">${c.학습목표2}</div>`:''}
        </div>
      </div>`:''}
      ${c.추천대상?`
      <div class="sec">
        <div class="stitle">🙋 추천 대상</div>
        <div class="goal" style="border-color:var(--gold)">${c.추천대상}</div>
      </div>`:''}
      ${instructors.length?`
      <div class="sec">
        <div class="stitle">👩‍🏫 강사 소개</div>
        ${instructors.map(i=>`<div class="icard">
          <div class="iname">${i.성명}</div>
          <div class="imeta">${i.소속||''}${i.전공?' · '+i.전공:''}</div>
        </div>`).join('')}
        ${c.강사소개?`<div class="ibio">${c.강사소개}</div>`:''}
      </div>`:''}
      ${sessions.length?`
      <div class="sec">
        <div class="stitle">📚 차시별 수업 계획</div>
        <div style="overflow-x:auto"><table class="stable">
          <thead><tr>
            <th style="width:38px">차시</th><th style="width:88px">일자</th><th>주요 내용</th>
          </tr></thead>
          <tbody>${sessions.map(s=>`<tr>
            <td style="text-align:center"><div class="snum">${s.차시}</div></td>
            <td>${s.일자||'-'}${s.시작시간?' '+s.시작시간:''}</td>
            <td>${(s.내용||'-').replace(/\n/g,'<br>')}</td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>`:''}
      <div class="sec">
        <div class="apply">
          <h4>📝 수강 신청 안내</h4>
          <p>온마당(www.onmadang.or.kr)에서 학생 개별 신청<br>
             1차 신청: 2026. 4. 16.(목) 18:00 ~ 4. 19.(일) 15:00<br>
             2차 신청: 2026. 4. 21.(화) 18:00 ~ 24:00<br>
             이수 기준: 수업 시수의 2/3 이상 출석 · 학생 개별 이동 원칙<br>
             문의: 충청남도교육청 중등교육과 ☎ 041-640-7221</p>
        </div>
      </div>
    </div>
    <div class="mfooter">🏫 ${c.기관명}</div>`;

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(e) {
  if (e && e.target!==document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
buildTabs(); render();
</script>
</body>
</html>
